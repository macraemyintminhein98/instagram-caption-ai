<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCaption AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">InstaCaption AI</h1>
        <p class="text-center text-gray-600 mb-6">Generate engaging Instagram captions instantly!</p>
        <div class="mb-4">
            <label for="keywords" class="block text-gray-700 text-sm font-bold mb-2">Keywords:</label>
            <input type="text" id="keywords" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., Summer vibes, coffee, productivity">
        </div>
        <div class="mb-6">
            <label for="tone" class="block text-gray-700 text-sm font-bold mb-2">Tone:</label>
            <select id="tone" class="block appearance-none w-full bg-white border border-gray-400 hover:border-gray-500 px-3 py-2 pr-8 rounded shadow leading-tight focus:outline-none focus:shadow-outline">
                <option>Friendly</option>
                <option>Professional</option>
                <option>Witty</option>
                <option>Inspirational</option>
            </select>
        </div>
        <button id="generateBtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline mb-4">
            Generate Caption
        </button>
        <div id="captionOutput" class="bg-gray-50 p-4 rounded text-gray-800 hidden">
            <h3 class="font-bold mb-2">Your Caption:</h3>
            <p id="generatedText" class="whitespace-pre-wrap"></p>
        </div>
        <p class="text-center text-sm text-gray-500 mt-6">Ready to create amazing captions? <a href="/buy" class="text-blue-500 hover:underline">Get access now!</a></p>
    </div>
    <script>
        // Placeholder for future JavaScript logic to integrate with backend API
        document.getElementById('generateBtn').addEventListener('click', () => {
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const outputDiv = document.getElementById('captionOutput');
            const generatedText = document.getElementById('generatedText');

            if (keywords) {
                outputDiv.classList.remove('hidden');
                generatedText.textContent = `Generating a ${tone} caption about '${keywords}'... (API integration coming soon!)`;
            } else {
                generatedText.textContent = "Please enter some keywords to generate a caption.";
                outputDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
