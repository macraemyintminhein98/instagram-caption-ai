<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Genius</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background-color: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 90%; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; resize: vertical; min-height: 80px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background-color 0.3s ease; }
        button:hover { background-color: #45a049; }
        #captionOutput { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 4px; text-align: left; white-space: pre-wrap; word-wrap: break-word; min-height: 50px; display: none; }
        .loading { display: none; margin-top: 15px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Caption Genius ✨</h1>
        <p>Enter keywords, get amazing Instagram captions!</p>
        <textarea id="keywordsInput" placeholder="e.g., new product launch, summer vibes, coffee art"></textarea>
        <button id="generateButton">Generate Captions ($4.99)</button>
        <div class="loading" id="loadingIndicator">Generating...</div>
        <div id="captionOutput"></div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('pk_test_YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key
        const generateButton = document.getElementById('generateButton');
        const keywordsInput = document.getElementById('keywordsInput');
        const captionOutput = document.getElementById('captionOutput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        generateButton.addEventListener('click', async () => {
            if (!keywordsInput.value.trim()) {
                alert('Please enter some keywords.');
                return;
            }

            loadingIndicator.style.display = 'block';
            captionOutput.style.display = 'none';
            captionOutput.innerHTML = '';
            generateButton.disabled = true;

            try {
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: keywordsInput.value })
                });
                const session = await response.json();

                const result = await stripe.redirectToCheckout({
                    sessionId: session.id
                });

                if (result.error) {
                    alert(result.error.message);
                }
            } catch (error) {
                console.error('Error during checkout:', error);
                alert('Failed to initiate checkout. Please try again.');
            } finally {
                loadingIndicator.style.display = 'none';
                generateButton.disabled = false;
            }
        });
    </script>
</body>
</html>
