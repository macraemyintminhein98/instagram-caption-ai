<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCaption AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">InstaCaption AI</h1>
        <p class="text-gray-600 mb-6">Craft perfect Instagram captions instantly.</p>
        <form id="caption-form" class="space-y-4">
            <input type="text" id="keywords" placeholder="Keywords (e.g., Summer, Beach, Fun)" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-pink-400" required>
            <select id="tone" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-pink-400">
                <option value="engaging">Engaging</option>
                <option value="funny">Funny</option>
                <option value="inspirational">Inspirational</option>
                <option value="witty">Witty</option>
                <option value="friendly">Friendly</option>
            </select>
            <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded-lg hover:bg-pink-600 transition-colors duration-200">Generate Caption</button>
        </form>
        <div id="output" class="mt-6 bg-gray-100 p-4 rounded-lg text-left hidden">
            <p class="font-semibold text-gray-700 mb-2">Your Caption:</p>
            <p id="caption-text" class="text-gray-800"></p>
        </div>
        <p class="mt-6 text-sm text-gray-500">Powered by AI. <a href="#" class="text-pink-500 hover:underline">Upgrade for more!</a></p>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        document.getElementById('caption-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            // In a real app, this would call a serverless function to interact with OpenAI and Stripe
            document.getElementById('caption-text').innerText = `[AI Placeholder] Here's an ${tone} caption for: ${keywords} (with emojis! ✨)`;
            document.getElementById('output').classList.remove('hidden');
        });
    </script>
</body>
</html>
