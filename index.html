<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Caption Spark AI</title><meta name="description" content="Generate engaging Instagram captions instantly with AI."><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>"><style>body{font-family:sans-serif;margin:20px;background:#f9f9f9;color:#333}h1{color:#1a73e8}label{display:block;margin-bottom:5px;font-weight:bold}input[type=text],textarea,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box}button{background-color:#1a73e8;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer;font-size:1em}button:hover{background-color:#145cb3}#output{margin-top:20px;padding:15px;background:#e9f5ff;border:1px solid #cceeff;border-radius:4px;white-space:pre-wrap}</style></head><body><h1>✨ Caption Spark AI</h1><p>Generate perfect Instagram captions in seconds!</p><form id="captionForm"><label for="keywords">Keywords:</label><input type="text" id="keywords" placeholder="e.g., coffee, sunrise, weekend vibes"><label for="sentiment">Sentiment:</label><select id="sentiment"><option value="positive">Positive</option><option value="neutral">Neutral</option><option value="funny">Funny</option><option value="inspirational">Inspirational</option></select><label for="postType">Post Type:</label><select id="postType"><option value="photo">Photo</option><option value="reel">Reel</option><option value="story">Story</option><option value="product">Product Launch</option></select><button type="submit">Generate Caption</button></form><div id="output"></div><script>document.getElementById('captionForm').addEventListener('submit',async(e)=>{e.preventDefault();const keywords=document.getElementById('keywords').value;const sentiment=document.getElementById('sentiment').value;const postType=document.getElementById('postType').value;document.getElementById('output').innerText='Generating...';try{const response=await fetch('/api/generate-caption',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords,sentiment,postType})});const data=await response.json();if(response.ok){document.getElementById('output').innerText=data.caption;}else{document.getElementById('output').innerText=`Error: ${data.error||'Something went wrong'}`;}}catch(error){document.getElementById('output').innerText=`Network error: ${error.message}`;}});</script></body></html>
