<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaCaption AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f7fafc; }
        .container { max-width: 800px; }
        .btn-primary { background-color: #6366f1; color: white; padding: 0.75rem 1.5rem; border-radius: 0.375rem; }
        .input-field { border: 1px solid #cbd5e0; padding: 0.75rem; border-radius: 0.375rem; width: 100%; }
        h1, h2 { color: #1a202c; }
        .card { background-color: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); padding: 2rem; }
        .caption-output { background-color: #edf2f7; padding: 1rem; border-radius: 0.375rem; min-height: 120px; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="container mx-auto text-center space-y-8">
        <h1 class="text-5xl font-extrabold">InstaCaption AI</h1>
        <p class="text-xl text-gray-700">Generate engaging Instagram captions with AI!</p>
        
        <div class="card max-w-xl mx-auto space-y-6">
            <input type="text" id="keywords" class="input-field" placeholder="Keywords (e.g., sunset, coffee, beach life)">
            <select id="tone" class="input-field">
                <option value="funny">Funny</option>
                <option value="inspiring">Inspiring</option>
                <option value="sales-oriented">Sales-Oriented</option>
                <option value="informative">Informative</option>
                <option value="casual">Casual</option>
            </select>
            <button id="generateBtn" class="btn-primary w-full">Generate 10 Captions for $9.99</button>
            <div id="captionOutput" class="caption-output text-gray-800 text-left">Your captions will appear here after purchase.</div>
        </div>
        
        <footer class="mt-12 text-gray-500">
            © 2023 InstaCaption AI. All rights reserved.
        </footer>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Placeholder for actual Stripe integration and AI API calls.
        document.getElementById('generateBtn').addEventListener('click', async () => {
            // In a real app, this would initiate a Stripe Checkout session.
            // On successful payment, it would call a backend API to generate captions.
            alert('This is a demo. In a live version, you would proceed to payment and then get 10 captions!');
            document.getElementById('captionOutput').innerText = 'Processing your request... (Demo output: Fantastic caption sample 1!\nAnother awesome caption here.\nAnd a third compelling caption.)';
        });
    </script>
</body>
</html>
